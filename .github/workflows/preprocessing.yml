name: Run Preprocessing Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing script
        run: |
          cd preprocessing
          python automate_faiz-fajar.py

      - name: Commit hasil preprocessing
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git pull origin main || true
          git add preprocessing/preprocessing_output || true
          git commit -m "Update preprocessing output [AUTO]" || echo "No changes to commit"
          git push
